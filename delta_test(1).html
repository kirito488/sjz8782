<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三角洲行动干员性格适配度测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e8e8e8;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(255,107,53,0.15) 0%, transparent 100%);
            border-bottom: 2px solid rgba(255,107,53,0.3);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #ff6b35;
            text-shadow: 0 0 20px rgba(255,107,53,0.5);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            color: #a0a0a0;
        }

        .intro-screen, .result-screen {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .intro-screen h2, .result-screen h2 {
            color: #ff6b35;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .intro-screen p {
            margin-bottom: 15px;
            color: #c0c0c0;
        }

        .operators-intro {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 25px 0;
        }

        .operator-badge {
            background: rgba(255,107,53,0.1);
            border: 1px solid rgba(255,107,53,0.3);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            font-size: 0.9em;
            color: #ff6b35;
        }

        .btn {
            background: linear-gradient(135deg, #ff6b35 0%, #e55a2b 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 30px auto 0;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(255,107,53,0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,107,53,0.6);
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        .quiz-container {
            display: none;
        }

        .quiz-container.active {
            display: block;
        }

        .question-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-number {
            color: #ff6b35;
            font-size: 0.9em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.3em;
            margin-bottom: 25px;
            color: #fff;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option:hover {
            background: rgba(255,107,53,0.1);
            border-color: rgba(255,107,53,0.5);
            transform: translateX(5px);
        }

        .option.selected {
            background: rgba(255,107,53,0.2);
            border-color: #ff6b35;
        }

        .option-letter {
            width: 35px;
            height: 35px;
            background: rgba(255,107,53,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff6b35;
            font-weight: bold;
            flex-shrink: 0;
        }

        .option.selected .option-letter {
            background: #ff6b35;
            color: white;
        }

        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #ff6b35, #ff8c5a);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .result-screen {
            display: none;
        }

        .result-screen.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .match-result {
            text-align: center;
            margin: 30px 0;
        }

        .matched-operator {
            font-size: 2.5em;
            color: #ff6b35;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(255,107,53,0.5);
        }

        .operator-image {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,107,53,0.05));
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            border: 3px solid rgba(255,107,53,0.5);
        }

        .operator-desc {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            text-align: left;
        }

        .operator-desc h3 {
            color: #ff6b35;
            margin-bottom: 15px;
        }

        .operator-desc p {
            color: #b0b0b0;
            margin-bottom: 10px;
        }

        .compatibility-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 20px;
            margin: 15px 0;
            overflow: hidden;
        }

        .compatibility-fill {
            background: linear-gradient(90deg, #4ade80, #22c55e);
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease;
        }

        .compatibility-text {
            color: #4ade80;
            font-weight: bold;
            font-size: 1.2em;
        }

        .secondary-matches {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .secondary-matches h3 {
            color: #888;
            margin-bottom: 15px;
        }

        .scrollable-list {
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .scrollable-list::-webkit-scrollbar {
            width: 8px;
        }
        
        .scrollable-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        
        .scrollable-list::-webkit-scrollbar-thumb {
            background: rgba(255,107,53,0.3);
            border-radius: 10px;
        }
        
        .scrollable-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255,107,53,0.5);
        }
        
        .secondary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        
        .secondary-item:hover {
            background: rgba(255,107,53,0.05);
            transform: translateX(5px);
        }

        .secondary-name {
            color: #fff;
        }

        .secondary-percent {
            color: #ff6b35;
            font-weight: bold;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        .nav-btn:hover {
            background: rgba(255,107,53,0.2);
            border-color: rgba(255,107,53,0.5);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            .question-text {
                font-size: 1.1em;
            }
            .matched-operator {
                font-size: 1.8em;
            }
            .intro-screen, .result-screen {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>三角洲行动</h1>
            <p>干员性格适配度测试</p>
        </header>

        <div class="intro-screen" id="introScreen">
            <h2>欢迎来到干员适配度测试</h2>
            <p>本测试包含 <strong>50道</strong> 性格测试题，通过测试结果将为你匹配最适合你的三角洲行动干员。</p>
            <p>测试将评估你的性格特点，包括：</p>
            <ul style="margin: 15px 0 15px 30px; color: #b0b0b0;">
                <li>行动风格（冲动 vs 冷静）</li>
                <li>团队角色（领导 vs 辅助）</li>
                <li>战斗偏好（进攻 vs 防守）</li>
                <li>风险态度（冒险 vs 稳健）</li>
                <li>社交倾向（独立 vs 协作）</li>
            </ul>
            <p style="margin-top: 20px; color: #888; font-size: 0.9em;">
                共涵盖15位干员：红狼、无名、威龙、露娜、银翼、骇爪、牧羊人、乌鲁鲁、深蓝、比特、蜂医、蛊、蝶、疾风、赛伊德
            </p>
            <button class="btn" onclick="startTest()">开始测试</button>
        </div>

        <div class="quiz-container" id="quizContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">题目 1 / 40</div>
            
            <div class="question-card" id="questionCard">
                <div class="question-number" id="questionNumber">问题 1</div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
            </div>

            <div class="navigation-buttons">
                <button class="nav-btn" id="prevBtn" onclick="prevQuestion()" disabled>上一题</button>
                <button class="nav-btn" id="nextBtn" onclick="nextQuestion()">下一题</button>
            </div>
        </div>

        <div class="result-screen" id="resultScreen">
            <h2>测试结果</h2>
            <div class="match-result">
                <div class="operator-image" id="resultIcon"></div>
                <div class="matched-operator" id="matchedOperator"></div>
                <div class="compatibility-text" id="compatibilityText"></div>
                <div class="compatibility-bar">
                    <div class="compatibility-fill" id="compatibilityFill"></div>
                </div>
            </div>
            
            <div class="operator-desc">
                <h3>干员介绍</h3>
                <p id="operatorDesc"></p>
                <p id="operatorPersonality"></p>
            </div>

            <div class="secondary-matches">
                <h3>所有干员适配度</h3>
                <div id="secondaryMatches" class="scrollable-list"></div>
            </div>

            <button class="btn" onclick="restartTest()">重新测试</button>
        </div>
    </div>

    <script>

                ]
            },

                options: [

                    { text: "战术运用", traits: { calm: 3, stealth: 2, independent: 1 } },
                    { text: "游戏体验", traits: { leader: 2, calm: 2, support: 1 } },
                    { text: "团队胜利", traits: { support: 3, leader: 1, calm: 1 } }
                ]
            }
        ];

        var currentQuestion = 0;
        var userAnswers = [];

        function startTest() {
            document.getElementById('introScreen').style.display = 'none';
            document.getElementById('quizContainer').classList.add('active');
            currentQuestion = 0;
            userAnswers = new Array(questions.length).fill(null);
            showQuestion();
        }

        function showQuestion() {
            var q = questions[currentQuestion];
            document.getElementById('questionNumber').textContent = '问题 ' + (currentQuestion + 1);
            document.getElementById('questionText').textContent = q.text;
            
            var progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = '题目 ' + (currentQuestion + 1) + ' / ' + questions.length;
            
            var optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            var letters = ['A', 'B', 'C', 'D'];
            for (var i = 0; i < q.options.length; i++) {
                var option = q.options[i];
                var optionEl = document.createElement('div');
                optionEl.className = 'option' + (userAnswers[currentQuestion] === i ? ' selected' : '');
                optionEl.innerHTML = '<div class="option-letter">' + letters[i] + '</div><div class="option-text">' + option.text + '</div>';
                optionEl.onclick = (function(index) {
                    return function() {
                        selectOption(index);
                    };
                })(i);
                optionsContainer.appendChild(optionEl);
            }
            
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').textContent = currentQuestion === questions.length - 1 ? '查看结果' : '下一题';
        }

        function selectOption(index) {
            userAnswers[currentQuestion] = index;
            var options = document.querySelectorAll('.option');
            for (var i = 0; i < options.length; i++) {
                if (i === index) {
                    options[i].classList.add('selected');
                } else {
                    options[i].classList.remove('selected');
                }
            }
            
            if (currentQuestion < questions.length - 1) {
                setTimeout(function() {
                    currentQuestion++;
                    showQuestion();
                }, 200);
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function nextQuestion() {
            if (userAnswers[currentQuestion] === null) {
                alert('请选择一个答案');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                showResult();
            }
        }

        function calculateResult() {
            var optionCounts = {
                A: 0,
                B: 0,
                C: 0,
                D: 0
            };
            
            for (var i = 0; i < userAnswers.length; i++) {
                var answer = userAnswers[i];
                if (answer !== null) {
                    if (answer === 0) optionCounts.A++;
                    else if (answer === 1) optionCounts.B++;
                    else if (answer === 2) optionCounts.C++;
                    else if (answer === 3) optionCounts.D++;
                }
            }
            
            var results = [];
            for (var key in operators) {
                var operator = operators[key];
                var score = 0;
                
                score += (optionCounts.A / 50) * (operator.traits.attack || 0) * 10;
                score += (optionCounts.B / 50) * (operator.traits.stealth || 0) * 10;
                score += (optionCounts.C / 50) * (operator.traits.leader || 0) * 10;
                score += (optionCounts.D / 50) * (operator.traits.support || 0) * 10;
                
                var percentage = Math.round(score);
                percentage = Math.max(0, Math.min(100, percentage));
                
                results.push({ key: key, percentage: percentage });
            }
            
            results.sort(function(a, b) {
                return b.percentage - a.percentage;
            });
            
            return results;
        }

        function showResult() {
            document.getElementById('quizContainer').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');
            
            var results = calculateResult();
            var bestMatch = results[0];
            var operator = operators[bestMatch.key];
            
            document.getElementById('resultIcon').textContent = operator.icon;
            document.getElementById('matchedOperator').textContent = operator.name;
            document.getElementById('compatibilityText').textContent = '适配度: ' + bestMatch.percentage + '%';
            document.getElementById('compatibilityFill').style.width = bestMatch.percentage + '%';
            document.getElementById('operatorDesc').textContent = operator.desc;
            document.getElementById('operatorPersonality').textContent = operator.personality;
            
            var secondaryContainer = document.getElementById('secondaryMatches');
            secondaryContainer.innerHTML = '';
            
            for (var i = 1; i < results.length; i++) {
                var result = results[i];
                var op = operators[result.key];
                var item = document.createElement('div');
                item.className = 'secondary-item';
                item.innerHTML = '<span class="secondary-name">' + op.icon + ' ' + op.name + '</span><span class="secondary-percent">' + result.percentage + '%</span>';
                secondaryContainer.appendChild(item);
            }
        }

        function restartTest() {
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('introScreen').style.display = 'block';
            currentQuestion = 0;
            userAnswers = [];
        }
    </script>
